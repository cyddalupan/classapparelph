<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test DTF Button Fix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { padding: 20px; }
        .test-success { background: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .test-error { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .log { background: #f8f9fa; padding: 10px; margin: 10px 0; border-radius: 5px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test DTF Button Fix</h1>
        
        <div class="alert alert-info">
            <h4>Testing the Direct Event Delegation Fix</h4>
            <p>This test verifies that the simple event delegation fix works.</p>
        </div>
        
        <!-- Test Results -->
        <div class="card">
            <div class="card-header">
                <h5>Test Results</h5>
            </div>
            <div class="card-body">
                <div id="test-results">
                    <p>Click the test button below...</p>
                </div>
                <button class="btn btn-primary" onclick="runTest()">Run Test</button>
            </div>
        </div>
        
        <!-- Console Log -->
        <div class="card mt-4">
            <div class="card-header">
                <h5>Console Log</h5>
            </div>
            <div class="card-body">
                <div class="log" id="console-log">
                    <p>Console messages will appear here...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Mock the functions that should exist in the sales form
        function addPrintSizeRow() {
            logMessage('✅ addPrintSizeRow() called successfully');
            return true;
        }
        
        function addShirtSizeRow() {
            logMessage('✅ addShirtSizeRow() called successfully');
            return true;
        }
        
        // The fix we added
        document.addEventListener('click', function(event) {
            // Check if click is on "Add Another Print Size" button
            if (event.target && event.target.id === 'add-print-size') {
                console.log('✅ Add Another Print Size button clicked (direct fix)');
                logMessage('✅ Add Another Print Size button clicked (direct fix)');
                addPrintSizeRow();
                event.preventDefault();
                return false;
            }
            
            // Check if click is on "Add Another Size" button
            if (event.target && event.target.id === 'add-shirt-size') {
                console.log('✅ Add Another Size button clicked (direct fix)');
                logMessage('✅ Add Another Size button clicked (direct fix)');
                addShirtSizeRow();
                event.preventDefault();
                return false;
            }
        });
        
        // Test function
        function runTest() {
            const results = document.getElementById('test-results');
            results.innerHTML = '';
            
            // Test 1: Check if event delegation is working
            logMessage('Starting test...');
            
            // Create test buttons
            const testContainer = document.createElement('div');
            testContainer.innerHTML = `
                <div class="mt-3">
                    <button type="button" class="btn btn-outline-primary me-2" id="add-print-size">
                        <i class="fas fa-plus me-1"></i> Add Another Print Size (Test)
                    </button>
                    <button type="button" class="btn btn-outline-success" id="add-shirt-size">
                        <i class="fas fa-plus me-1"></i> Add Another Size (Test)
                    </button>
                </div>
                <div class="mt-3">
                    <p>Click the buttons above. You should see success messages in the console log.</p>
                </div>
            `;
            
            results.appendChild(testContainer);
            
            // Add test result
            const testResult = document.createElement('div');
            testResult.className = 'test-success mt-3';
            testResult.innerHTML = `
                <h6>Test Setup Complete</h6>
                <p>Click the test buttons above. If the fix is working, you'll see:</p>
                <ul>
                    <li>"✅ Add Another Print Size button clicked (direct fix)"</li>
                    <li>"✅ addPrintSizeRow() called successfully"</li>
                    <li>"✅ Add Another Size button clicked (direct fix)"</li>
                    <li>"✅ addShirtSizeRow() called successfully"</li>
                </ul>
                <p>If you see these messages, the fix is working!</p>
            `;
            results.appendChild(testResult);
        }
        
        // Helper function to log messages
        function logMessage(message) {
            const logDiv = document.getElementById('console-log');
            const p = document.createElement('p');
            p.textContent = '[' + new Date().toLocaleTimeString() + '] ' + message;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
            
            // Also log to browser console
            console.log(message);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            logMessage('Page loaded. Click "Run Test" to test the DTF button fix.');
        });
    </script>
</body>
</html>
