<!DOCTYPE html>
<html>
<head>
    <style>
        /* Simulated nav-item styles from app.css */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s;
            position: relative;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover {
            background: #f1f5f9;
            color: #2563eb;
            border-left-color: #2563eb;
        }
        
        .nav-item.active {
            background: #eff6ff;
            color: #2563eb;
            border-left-color: #2563eb;
            font-weight: 600;
        }
        
        .nav-item i {
            width: 20px;
            text-align: center;
            font-size: 1.125rem;
            flex-shrink: 0;
        }
        
        /* Our dropdown styles */
        .nav-dropdown {
            position: relative;
            cursor: pointer;
        }
        
        .nav-dropdown-arrow {
            margin-left: auto;
            font-size: 0.75rem;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        
        .nav-dropdown.active .nav-dropdown-arrow {
            transform: rotate(180deg);
        }
        
        .nav-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-top: 0.25rem;
            padding: 0.25rem 0;
            z-index: 1000;
            min-width: 200px;
            overflow: visible;
        }
        
        .nav-dropdown.active .nav-dropdown-menu {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .nav-dropdown-item {
            display: flex;
            align-items: center;
            padding: 0.5rem 1rem;
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.875rem;
            gap: 0.5rem;
        }
        
        .nav-dropdown-item:hover {
            background: #f1f5f9;
            color: #2563eb;
        }
        
        .nav-dropdown-item.active {
            background: #eff6ff;
            color: #2563eb;
            font-weight: 500;
        }
        
        .nav-dropdown-item i {
            width: 16px;
            text-align: center;
            font-size: 0.875rem;
            flex-shrink: 0;
        }
        
        .nav-dropdown-item span {
            flex: 1;
        }
        
        /* Test container */
        .sidebar {
            width: 250px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            height: 100vh;
            padding: 1rem 0;
        }
        
        .nav-text {
            flex: 1;
            font-size: 0.875rem;
            font-weight: inherit;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Test Sidebar</h3>
        
        <!-- Regular nav item for comparison -->
        <a href="#" class="nav-item">
            <i class="fas fa-money-bill-wave"></i>
            <span class="nav-text">Product Pricing</span>
        </a>
        
        <!-- Customers for comparison -->
        <a href="#" class="nav-item">
            <i class="fas fa-users"></i>
            <span class="nav-text">Customers</span>
        </a>
        
        <!-- Our dropdown -->
        <a href="#" class="nav-item nav-dropdown">
            <i class="fas fa-boxes"></i>
            <span class="nav-text">Inventory Management</span>
            <i class="fas fa-chevron-down nav-dropdown-arrow"></i>
            <div class="nav-dropdown-menu">
                <a href="#" class="nav-dropdown-item">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-dropdown-item">
                    <i class="fas fa-plus-circle"></i>
                    <span>Inventory Action</span>
                </a>
                <a href="#" class="nav-dropdown-item">
                    <i class="fas fa-cube"></i>
                    <span>Product</span>
                </a>
            </div>
        </a>
        
        <!-- Production for comparison -->
        <a href="#" class="nav-item">
            <i class="fas fa-cogs"></i>
            <span class="nav-text">Production</span>
        </a>
    </div>
    
    <script>
        // Load Font Awesome
        const fa = document.createElement('link');
        fa.rel = 'stylesheet';
        fa.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';
        document.head.appendChild(fa);
        
        // Dropdown functionality
        document.querySelectorAll('.nav-dropdown').forEach(dropdown => {
            dropdown.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                // Don't toggle if clicking on dropdown menu items
                if (e.target.closest('.nav-dropdown-item')) {
                    return;
                }
                
                this.classList.toggle('active');
                
                // Close other dropdowns
                document.querySelectorAll('.nav-dropdown').forEach(other => {
                    if (other !== this) {
                        other.classList.remove('active');
                    }
                });
            });
        });

        // Close dropdowns when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.nav-dropdown')) {
                document.querySelectorAll('.nav-dropdown').forEach(dropdown => {
                    dropdown.classList.remove('active');
                });
            }
        });
        
        console.log('Test page loaded. Click "Inventory Management" to test dropdown.');
    </script>
</body>
</html>
